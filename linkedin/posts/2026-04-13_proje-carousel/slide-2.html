<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Proje Carousel - Slide 2 Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #1a1a2e;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .canvas {
    width: 1080px; height: 1080px;
    background: #010E21;
    position: relative; overflow: hidden;
  }
  .glow {
    position: absolute; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0, 112, 243, 0.10) 0%, transparent 60%);
    top: -80px; right: -80px; pointer-events: none;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    height: 100%; padding: 64px;
    justify-content: space-between;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left {
    display: flex; align-items: center; gap: 16px;
  }
  .feature-number {
    font-size: 14px; font-weight: 700;
    color: #010E21;
    background: #10B981;
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .feature-title {
    font-size: 16px; font-weight: 600;
    color: #10B981;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .page-num {
    font-size: 13px; font-weight: 500; color: #475569;
  }

  /* Main */
  .main-area {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; gap: 36px;
  }

  .headline {
    font-size: 40px; font-weight: 700;
    line-height: 1.15; letter-spacing: -0.025em;
    color: #FFFFFF;
  }
  .headline-accent {
    background: linear-gradient(to right, #0070F3, #38BDF8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .desc {
    font-size: 18px; font-weight: 300;
    line-height: 1.6; color: #94A3B8;
    max-width: 600px;
  }

  /* Dashboard mockup */
  .dashboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .dash-card {
    padding: 24px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    gap: 8px;
  }

  .dash-value {
    font-size: 36px; font-weight: 700;
    letter-spacing: -0.025em;
  }
  .val-blue { color: #0070F3; }
  .val-green { color: #10B981; }
  .val-purple { color: #A855F7; }

  .dash-label {
    font-size: 12px; font-weight: 500;
    color: #64748B; text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .dash-wide {
    grid-column: span 3;
    padding: 24px 28px;
    display: flex; flex-direction: column; gap: 14px;
    align-items: stretch; text-align: left;
  }

  .bar-header {
    display: flex; justify-content: space-between;
    align-items: center;
  }
  .bar-title {
    font-size: 13px; font-weight: 600; color: #94A3B8;
  }
  .bar-percent {
    font-size: 13px; font-weight: 600; color: #10B981;
  }

  .bar-track {
    height: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 5px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 5px;
    background: linear-gradient(to right, #10B981, #22D3EE);
  }

  /* Bottom dots */
  .bottom {
    display: flex; justify-content: center; gap: 8px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.10);
  }
  .dot-active {
    background: #10B981;
    box-shadow: 0 0 8px rgba(16, 185, 129, 0.50);
    width: 24px; border-radius: 4px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="glow"></div>
  <div class="grid"></div>

  <div class="content">
    <div class="header">
      <div class="header-left">
        <div class="feature-number">1</div>
        <div class="feature-title">Kontrol Paneli</div>
      </div>
      <div class="page-num">2 / 7</div>
    </div>

    <div class="main-area">
      <h2 class="headline">
        Story Point, Bütçe, Risk —<br>
        <span class="headline-accent">Tek Bakışta</span>
      </h2>

      <p class="desc">
        Sprint performansı, efor dağılımı ve risk analizi tek dashboard'da. Karar almak için sekme değiştirmeye son.
      </p>

      <div class="dashboard">
        <div class="dash-card">
          <div class="dash-value val-blue">34</div>
          <div class="dash-label">Story Point</div>
        </div>
        <div class="dash-card">
          <div class="dash-value val-green">%87</div>
          <div class="dash-label">Kapasite</div>
        </div>
        <div class="dash-card">
          <div class="dash-value val-purple">12</div>
          <div class="dash-label">Tamamlanan</div>
        </div>

        <div class="dash-card dash-wide">
          <div class="bar-header">
            <span class="bar-title">Sprint İlerlemesi</span>
            <span class="bar-percent">%72</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width: 72%;"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <div class="dot"></div>
      <div class="dot dot-active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>
</body>
</html>
