<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Proje Carousel - Slide 1 Kapak</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #1a1a2e;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .canvas {
    width: 1080px; height: 1080px;
    background: #010E21;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* BG */
  .glow-1 {
    position: absolute; width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(16, 185, 129, 0.12) 0%, transparent 60%);
    top: -100px; right: -100px; pointer-events: none;
  }
  .glow-2 {
    position: absolute; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0, 112, 243, 0.08) 0%, transparent 65%);
    bottom: -100px; left: -80px; pointer-events: none;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }
  .line-top {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 400px; height: 1px;
    background: linear-gradient(to right, transparent, rgba(16, 185, 129, 0.40), transparent);
  }

  /* Content */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    gap: 40px; padding: 80px 64px;
    height: 100%; justify-content: space-between;
  }

  .top-area {
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
  }

  .logo-row {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 40px; height: 40px; border-radius: 10px; overflow: hidden;
  }
  .logo-icon img { width: 100%; height: 100%; object-fit: contain; }
  .logo-text { font-size: 22px; letter-spacing: -0.025em; color: #FFF; }
  .logo-bold { font-weight: 700; }
  .logo-light { font-weight: 400; color: #94A3B8; }

  .page-indicator {
    font-size: 12px; font-weight: 500; color: #475569;
    letter-spacing: 0.1em;
  }

  .center-area {
    display: flex; flex-direction: column;
    align-items: center; gap: 32px;
  }

  .module-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 20px;
    background: rgba(16, 185, 129, 0.08);
    border: 1px solid rgba(16, 185, 129, 0.25);
    border-radius: 9999px;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #10B981;
  }
  .badge-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #10B981;
    box-shadow: 0 0 10px rgba(16, 185, 129, 0.60);
  }

  .headline {
    font-size: 64px; font-weight: 800;
    line-height: 1.08; letter-spacing: -0.03em;
    color: #FFFFFF;
  }
  .headline-accent {
    background: linear-gradient(to right, #10B981, #22D3EE);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subline {
    font-size: 20px; font-weight: 300;
    line-height: 1.6; color: #94A3B8;
    max-width: 600px;
  }

  .features-preview {
    display: flex; gap: 16px; flex-wrap: wrap;
    justify-content: center;
  }
  .fp-item {
    padding: 10px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 9999px;
    font-size: 14px; font-weight: 500; color: #CBD5E1;
  }

  .bottom-area {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
  }

  .swipe-hint {
    font-size: 14px; font-weight: 500; color: #64748B;
    display: flex; align-items: center; gap: 8px;
  }
  .swipe-arrow { font-size: 20px; color: #0070F3; }

  .dots {
    display: flex; gap: 8px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.10);
  }
  .dot-active {
    background: #10B981;
    box-shadow: 0 0 8px rgba(16, 185, 129, 0.50);
    width: 24px; border-radius: 4px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="grid"></div>
  <div class="line-top"></div>

  <div class="content">
    <div class="top-area">
      <div class="logo-row">
        <div class="logo-icon"><img src="../../../brand/assets/logo-v1.png" alt="SC"></div>
        <div class="logo-text"><span class="logo-bold">Service</span><span class="logo-light">Core</span></div>
      </div>
      <div class="page-indicator">1 / 7</div>
    </div>

    <div class="center-area">
      <div class="module-badge">
        <span class="badge-dot"></span>
        Proje Yönetimi Modülü
      </div>

      <h1 class="headline">
        <span class="headline-accent">Agile Hız,</span><br>
        Stratejik Kontrol
      </h1>

      <p class="subline">
        Backlog'dan roadmap'e, sprint'ten raporlamaya — proje yönetiminin tüm katmanları tek platformda.
      </p>

      <div class="features-preview">
        <div class="fp-item">Kanban</div>
        <div class="fp-item">Scrum</div>
        <div class="fp-item">Gantt</div>
        <div class="fp-item">Isı Haritası</div>
        <div class="fp-item">Sprint Kapasitesi</div>
        <div class="fp-item">Backlog</div>
      </div>
    </div>

    <div class="bottom-area">
      <div class="swipe-hint">
        Kaydırarak keşfedin <span class="swipe-arrow">&rarr;</span>
      </div>
      <div class="dots">
        <div class="dot dot-active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
