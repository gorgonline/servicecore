<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiceCore LinkedIn Ad - Varyant 4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }

  .canvas {
    width: 1200px;
    height: 628px;
    background: #010E21;
    position: relative;
    overflow: hidden;
  }

  /* Background */
  .glow-1 {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.10) 0%, transparent 60%);
    top: -150px;
    right: -100px;
    pointer-events: none;
  }

  .glow-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0, 112, 243, 0.08) 0%, transparent 70%);
    bottom: -80px;
    left: 100px;
    pointer-events: none;
  }

  .grid-pattern {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .line-top {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(168, 85, 247, 0.35), transparent);
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    height: 100%;
    padding: 44px 56px;
    justify-content: space-between;
  }

  /* Top */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    overflow: hidden;
  }

  .logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .logo-text {
    font-size: 18px;
    letter-spacing: -0.025em;
    color: #FFFFFF;
  }

  .logo-bold { font-weight: 700; }
  .logo-light { font-weight: 400; color: #94A3B8; }

  /* Center */
  .center-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .big-number {
    font-size: 100px;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    background: linear-gradient(to bottom, #FFFFFF, rgba(255, 255, 255, 0.35));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .big-number-label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #64748B;
    margin-top: -8px;
  }

  .headline {
    font-size: 44px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: #FFFFFF;
    max-width: 700px;
  }

  .headline-accent {
    background: linear-gradient(to right, #A855F7, #38BDF8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subline {
    font-size: 17px;
    font-weight: 300;
    color: #94A3B8;
    max-width: 550px;
    line-height: 1.5;
  }

  .cta-button {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 40px;
    background: #A855F7;
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 600;
    border-radius: 9999px;
    border: none;
    box-shadow: 0 0 40px -5px rgba(168, 85, 247, 0.50);
  }

  .cta-arrow { font-size: 18px; }

  /* Bottom */
  .bottom-bar {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .bottom-label {
    font-size: 10px;
    font-weight: 500;
    color: #334155;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .bottom-separator {
    width: 1px;
    height: 18px;
    background: rgba(255, 255, 255, 0.08);
  }

  .customer-logos {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .customer-logo {
    height: 22px;
    opacity: 0.30;
    filter: brightness(0) invert(1);
    object-fit: contain;
  }
</style>
</head>
<body>

<div class="canvas">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="grid-pattern"></div>
  <div class="line-top"></div>

  <div class="content">

    <!-- Top -->
    <div class="top-bar">
      <div class="logo-icon">
        <img src="../../../brand/assets/logo-v1.png" alt="ServiceCore">
      </div>
      <div class="logo-text">
        <span class="logo-bold">Service</span><span class="logo-light">Core</span>
      </div>
    </div>

    <!-- Center -->
    <div class="center-block">
      <div class="big-number">4M+</div>
      <div class="big-number-label">Kullanıcı Güveniyor</div>

      <h1 class="headline">
        <span class="headline-accent">Çeyrek Asır</span> ITSM Deneyimi
      </h1>

      <p class="subline">
        Türkiye'nin kurumsal altyapısını şekillendiren platform. 16 ITIL4 süreci, 24+ modül, ispatlanmış sonuçlar.
      </p>

      <div class="cta-button">
        Demo Talep Edin
        <span class="cta-arrow">&rarr;</span>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom-bar">
      <span class="bottom-label">Tercih Eden Kurumlar</span>
      <div class="bottom-separator"></div>
      <div class="customer-logos">
        <img class="customer-logo" style="height: 36px;" src="../../../website/public/logos/sabanci.png" alt="Sabancı">
        <img class="customer-logo" src="../../../website/public/logos/boyner.png" alt="Boyner">
        <img class="customer-logo" src="../../../website/public/logos/roketsan.png" alt="Roketsan">
        <img class="customer-logo" src="../../../website/public/logos/qnb.png" alt="QNB Finansbank">
        <img class="customer-logo" style="height: 30px;" src="../../../website/public/logos/toyota.png" alt="Toyota">
      </div>
    </div>

  </div>
</div>

</body>
</html>
