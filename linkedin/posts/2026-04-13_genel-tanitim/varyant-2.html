<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiceCore LinkedIn Ad - Varyant 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }

  .canvas {
    width: 1200px;
    height: 628px;
    background: #010E21;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Background effects */
  .glow-center {
    position: absolute;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(0, 112, 243, 0.12) 0%, transparent 60%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .glow-top-left {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.06) 0%, transparent 70%);
    top: -150px;
    left: -100px;
    pointer-events: none;
  }

  .glow-bottom-right {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(16, 185, 129, 0.06) 0%, transparent 70%);
    bottom: -150px;
    right: -100px;
    pointer-events: none;
  }

  /* Horizontal light lines */
  .line-top {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(0, 112, 243, 0.40), transparent);
  }

  .line-bottom {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(0, 112, 243, 0.20), transparent);
  }

  /* Grid */
  .grid-pattern {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    padding: 44px 56px;
    height: 100%;
    justify-content: space-between;
  }

  /* Top: logo */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    overflow: hidden;
  }

  .logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .logo-text {
    font-size: 18px;
    letter-spacing: -0.025em;
    color: #FFFFFF;
  }

  .logo-bold { font-weight: 700; }
  .logo-light { font-weight: 400; color: #94A3B8; }

  /* Center: headline + stats + CTA */
  .center-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .headline {
    font-size: 50px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: #FFFFFF;
  }

  .headline-accent {
    background: linear-gradient(to right, #60A5FA, #C084FC);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Stats row */
  .stats-row {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 40px;
  }

  .stat-divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.15), transparent);
  }

  .stat-number {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: #FFFFFF;
  }

  .stat-number-blue { color: #0070F3; }
  .stat-number-green { color: #10B981; }
  .stat-number-purple { color: #A855F7; }

  .stat-label {
    font-size: 12px;
    font-weight: 500;
    color: #64748B;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  /* CTA */
  .cta-button {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 40px;
    background: #0070F3;
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 600;
    border-radius: 9999px;
    border: none;
    box-shadow: 0 0 40px -5px rgba(0, 112, 243, 0.50);
    letter-spacing: -0.01em;
  }

  .cta-arrow {
    font-size: 18px;
  }

  /* Bottom: logos */
  .bottom-bar {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .bottom-label {
    font-size: 11px;
    font-weight: 500;
    color: #334155;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .bottom-separator {
    width: 1px;
    height: 20px;
    background: rgba(255, 255, 255, 0.08);
  }

  .customer-logos {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .customer-logo {
    height: 22px;
    opacity: 0.30;
    filter: brightness(0) invert(1);
    object-fit: contain;
  }
</style>
</head>
<body>

<div class="canvas">
  <!-- Background -->
  <div class="glow-center"></div>
  <div class="glow-top-left"></div>
  <div class="glow-bottom-right"></div>
  <div class="grid-pattern"></div>
  <div class="line-top"></div>
  <div class="line-bottom"></div>

  <!-- Content -->
  <div class="content">

    <!-- Top: Logo -->
    <div class="top-bar">
      <div class="logo-icon">
        <img src="../../../brand/assets/logo-v1.png" alt="ServiceCore">
      </div>
      <div class="logo-text">
        <span class="logo-bold">Service</span><span class="logo-light">Core</span>
      </div>
    </div>

    <!-- Center -->
    <div class="center-block">
      <h1 class="headline">
        ITSM ve Proje Yönetimini<br>
        <span class="headline-accent">Tek Platformda</span> Birleştirin
      </h1>

      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-number stat-number-blue">16</div>
          <div class="stat-label">ITIL4 Süreci</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-number stat-number-green">24+</div>
          <div class="stat-label">Modül</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-number stat-number-purple">4M+</div>
          <div class="stat-label">Kullanıcı</div>
        </div>
      </div>

      <div class="cta-button">
        Demo Talep Edin
        <span class="cta-arrow">&rarr;</span>
      </div>
    </div>

    <!-- Bottom: Customer logos -->
    <div class="bottom-bar">
      <span class="bottom-label">Tercih Eden Kurumlar</span>
      <div class="bottom-separator"></div>
      <div class="customer-logos">
        <img class="customer-logo" style="height: 36px;" src="../../../website/public/logos/sabanci.png" alt="Sabanci">
        <img class="customer-logo" src="../../../website/public/logos/boyner.png" alt="Boyner">
        <img class="customer-logo" src="../../../website/public/logos/roketsan.png" alt="Roketsan">
        <img class="customer-logo" src="../../../website/public/logos/qnb.png" alt="QNB Finansbank">
        <img class="customer-logo" style="height: 30px;" src="../../../website/public/logos/toyota.png" alt="Toyota">
      </div>
    </div>

  </div>
</div>

</body>
</html>
