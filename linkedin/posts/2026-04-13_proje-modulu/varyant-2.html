<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiceCore Proje Modülü - Varyant 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }

  .canvas {
    width: 1200px;
    height: 628px;
    background: #010E21;
    position: relative;
    overflow: hidden;
  }

  /* Background */
  .glow-center {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(16, 185, 129, 0.10) 0%, transparent 60%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .glow-corner {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(0, 112, 243, 0.06) 0%, transparent 70%);
    top: -100px;
    left: -80px;
    pointer-events: none;
  }

  .grid-pattern {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .line-top {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(16, 185, 129, 0.35), transparent);
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    height: 100%;
    padding: 44px 56px;
    justify-content: space-between;
  }

  /* Top */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    overflow: hidden;
  }

  .logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .logo-text {
    font-size: 18px;
    letter-spacing: -0.025em;
    color: #FFFFFF;
  }

  .logo-bold { font-weight: 700; }
  .logo-light { font-weight: 400; color: #94A3B8; }

  /* Center */
  .center-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .module-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 18px;
    background: rgba(16, 185, 129, 0.08);
    border: 1px solid rgba(16, 185, 129, 0.20);
    border-radius: 9999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #10B981;
  }

  .module-badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #10B981;
    box-shadow: 0 0 8px rgba(16, 185, 129, 0.60);
  }

  .headline {
    font-size: 48px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: #FFFFFF;
  }

  .headline-accent {
    background: linear-gradient(to right, #10B981, #22D3EE);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Feature pills */
  .features-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .feature-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 9999px;
    font-size: 13px;
    font-weight: 500;
    color: #CBD5E1;
  }

  .pill-icon {
    font-size: 14px;
  }

  .pill-green .pill-icon { color: #10B981; }
  .pill-blue .pill-icon { color: #0070F3; }
  .pill-purple .pill-icon { color: #A855F7; }
  .pill-cyan .pill-icon { color: #22D3EE; }
  .pill-orange .pill-icon { color: #F97316; }

  .cta-button {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 40px;
    background: #10B981;
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 600;
    border-radius: 9999px;
    border: none;
    box-shadow: 0 0 40px -5px rgba(16, 185, 129, 0.50);
  }

  .cta-arrow { font-size: 18px; }

  /* Bottom */
  .bottom-bar {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .bottom-label {
    font-size: 10px;
    font-weight: 500;
    color: #334155;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .bottom-separator {
    width: 1px;
    height: 18px;
    background: rgba(255, 255, 255, 0.08);
  }

  .customer-logos {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .customer-logo {
    height: 22px;
    opacity: 0.30;
    filter: brightness(0) invert(1);
    object-fit: contain;
  }
</style>
</head>
<body>

<div class="canvas">
  <div class="glow-center"></div>
  <div class="glow-corner"></div>
  <div class="grid-pattern"></div>
  <div class="line-top"></div>

  <div class="content">

    <!-- Top -->
    <div class="top-bar">
      <div class="logo-icon">
        <img src="../../../brand/assets/logo-v1.png" alt="ServiceCore">
      </div>
      <div class="logo-text">
        <span class="logo-bold">Service</span><span class="logo-light">Core</span>
      </div>
    </div>

    <!-- Center -->
    <div class="center-block">
      <div class="module-badge">
        <span class="module-badge-dot"></span>
        Proje Yönetimi Modülü
      </div>

      <h1 class="headline">
        Sprint'ten Roadmap'e<br>
        <span class="headline-accent">Tek Platform</span>
      </h1>

      <div class="features-row">
        <div class="feature-pill pill-green">
          <span class="pill-icon">&#9632;</span>
          Kanban
        </div>
        <div class="feature-pill pill-blue">
          <span class="pill-icon">&#9654;</span>
          Scrum
        </div>
        <div class="feature-pill pill-purple">
          <span class="pill-icon">&#9644;</span>
          Gantt
        </div>
        <div class="feature-pill pill-orange">
          <span class="pill-icon">&#9608;</span>
          Isı Haritası
        </div>
        <div class="feature-pill pill-cyan">
          <span class="pill-icon">&#9679;</span>
          Sprint Kapasitesi
        </div>
      </div>

      <div class="cta-button">
        Demo Talep Edin
        <span class="cta-arrow">&rarr;</span>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom-bar">
      <span class="bottom-label">Güvenen Kurumlar</span>
      <div class="bottom-separator"></div>
      <div class="customer-logos">
        <img class="customer-logo" style="height: 36px;" src="../../../website/public/logos/sabanci.png" alt="Sabancı">
        <img class="customer-logo" src="../../../website/public/logos/boyner.png" alt="Boyner">
        <img class="customer-logo" src="../../../website/public/logos/roketsan.png" alt="Roketsan">
        <img class="customer-logo" src="../../../website/public/logos/qnb.png" alt="QNB Finansbank">
        <img class="customer-logo" style="height: 30px;" src="../../../website/public/logos/toyota.png" alt="Toyota">
      </div>
    </div>

  </div>
</div>

</body>
</html>
