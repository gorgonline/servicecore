<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Genel Carousel - Slide 1 Kapak</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #1a1a2e;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .canvas {
    width: 1080px; height: 1080px;
    background: #010E21;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .glow-1 {
    position: absolute; width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0, 112, 243, 0.12) 0%, transparent 55%);
    top: -100px; right: -100px; pointer-events: none;
  }
  .glow-2 {
    position: absolute; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.06) 0%, transparent 65%);
    bottom: -100px; left: -80px; pointer-events: none;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }
  .line-top {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 400px; height: 1px;
    background: linear-gradient(to right, transparent, rgba(0, 112, 243, 0.40), transparent);
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    gap: 40px; padding: 80px 64px;
    height: 100%; justify-content: space-between;
  }

  .top-area { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .logo-row { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 44px; height: 44px; border-radius: 12px; overflow: hidden; }
  .logo-icon img { width: 100%; height: 100%; object-fit: contain; }
  .logo-text { font-size: 24px; letter-spacing: -0.025em; color: #FFF; }
  .logo-bold { font-weight: 700; }
  .logo-light { font-weight: 400; color: #94A3B8; }
  .page-indicator { font-size: 12px; font-weight: 500; color: #475569; letter-spacing: 0.1em; }

  .center-area { display: flex; flex-direction: column; align-items: center; gap: 32px; }

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 20px;
    background: rgba(0, 112, 243, 0.08);
    border: 1px solid rgba(0, 112, 243, 0.25);
    border-radius: 9999px;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: #0070F3;
  }
  .badge-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #0070F3; box-shadow: 0 0 10px rgba(0, 112, 243, 0.60);
  }

  .headline {
    font-size: 64px; font-weight: 800;
    line-height: 1.08; letter-spacing: -0.03em; color: #FFF;
  }
  .headline-accent {
    background: linear-gradient(to right, #0070F3, #38BDF8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subline {
    font-size: 20px; font-weight: 300;
    line-height: 1.6; color: #94A3B8; max-width: 600px;
  }

  .stats-row { display: flex; align-items: center; gap: 0; }
  .stat-item { display: flex; flex-direction: column; align-items: center; padding: 0 36px; }
  .stat-divider {
    width: 1px; height: 48px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
  }
  .stat-number { font-size: 32px; font-weight: 700; letter-spacing: -0.025em; color: #FFF; }
  .sn-blue { color: #0070F3; }
  .sn-green { color: #10B981; }
  .sn-purple { color: #A855F7; }
  .stat-label {
    font-size: 11px; font-weight: 500; color: #64748B;
    text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px;
  }

  .bottom-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .swipe-hint {
    font-size: 14px; font-weight: 500; color: #64748B;
    display: flex; align-items: center; gap: 8px;
  }
  .swipe-arrow { font-size: 20px; color: #0070F3; }
  .dots { display: flex; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.10); }
  .dot-active {
    background: #0070F3; box-shadow: 0 0 8px rgba(0, 112, 243, 0.50);
    width: 24px; border-radius: 4px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="grid"></div>
  <div class="line-top"></div>

  <div class="content">
    <div class="top-area">
      <div class="logo-row">
        <div class="logo-icon"><img src="../../../brand/assets/logo-v1.png" alt="SC"></div>
        <div class="logo-text"><span class="logo-bold">Service</span><span class="logo-light">Core</span></div>
      </div>
      <div class="page-indicator">1 / 7</div>
    </div>

    <div class="center-area">
      <div class="badge">
        <span class="badge-dot"></span>
        Kurumsal Orkestrasyon Platformu
      </div>

      <h1 class="headline">
        ITSM ve Proje Yönetimini<br>
        <span class="headline-accent">Tek Platformda</span><br>
        Birleştirin
      </h1>

      <p class="subline">
        Hizmet masasından varlık yönetimine, değişiklik kontrolünden raporlamaya — 24+ modül, tek çatı altında.
      </p>

      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-number sn-blue">16</div>
          <div class="stat-label">ITIL4 Süreci</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-number sn-green">24+</div>
          <div class="stat-label">Modül</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-number sn-purple">4M+</div>
          <div class="stat-label">Kullanıcı</div>
        </div>
      </div>
    </div>

    <div class="bottom-area">
      <div class="swipe-hint">
        Kaydırarak keşfedin <span class="swipe-arrow">&rarr;</span>
      </div>
      <div class="dots">
        <div class="dot dot-active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
